    <section>
        <h1>Junte-se a comunidade</h1>
        <p>Crie sua conta e tenha acesso a recursos exclusivos, conquistas e muito mais.</p>
         <div class="grid">
                <div class="coluna">
                    <div class="card1">
                        <h2 class="mensagem">Envie sua Mensagem</h2>
                    <form>
                        <label class="nome" for="nome">Nome Completo</label>
                        <input type="text" id="nome" name="nome" required>

                        <label class="email" for="email">Email</label>
                        <input type="email" id="email" name="email" required>

                        <label class="assunto" for="assunto">Senha</label>
                        <input type="text" id="assunto" name="assunto" required>

                        <label class="mensagem" for="mensagem">Confirmar Senha</label>
                        <textarea id="mensagem" name="mensagem" required></textarea>

                        <button class="botao" type="submit">Criar Minha Conta</button>
                    </form>
                    </div>
                </div>
            </div>
    </section>
