<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>CONTATO</title>
    <meta charset="UTF-8">
    <meta name="description" content="Site de um jogo de plataforma 2d (Level Hard)">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="styleC.css">
</head>
<body>
    <header>
        <a href="index.html" title="Home">
            <img src="imgs/logo.png" alt="Level Hard" title="Level Hard">
        </a>
        <nav>
            <ul class="menu">
                <li class="inicio">
                    <a href="./index.html">INÍCIO</a>
                </li>
                <li>
                    <a href="./historia.html">HISTÓRIA</a>
                </li>
                <li>
                    <a href="./contato.html">CONTATO</a>
                </li>
                <li>
                   <a href="./cadastro.html">CADASTRO</a>
                </li>
            </ul>
        </nav>
    </header>

    <section>
        <i class="fa-solid fa-message"></i>
        <h1>Fale Conosco</h1>
        <p>Estamos aqui para ajudar. Entre em contato e responderemos o mais rápido possível.</p>
            <div class="grid">
                <div class="coluna">
                    <div class="card1">
                        <h2 class="mensagem">Envie sua Mensagem</h2>
                    <form>
                        <label class="nome" for="nome">Nome:</label>
                        <input type="text" id="nome" name="nome" required>

                        <label class="email" for="email">Email:</label>
                        <input type="email" id="email" name="email" required>

                        <label class="assunto" for="assunto">Assunto:</label>
                        <input type="text" id="assunto" name="assunto" required>

                        <label class="label mensagem" for="mensagem">Mensagem:</label>
                        <textarea id="mensagem" name="mensagem" required></textarea>

                        <button class="botao" type="submit">Enviar</button>
                    </form>
                    </div>
                </div>
                <div class="coluna">
                    <div class="card2">
                        <h2 class="informacoes"> Informações</h2>
                        <p class="email">Email: contato@levelhard.com</p>
                        <p class="telefone">Telefone: (11) 1234-5678</p>
                        <p class="horario">Horário <br>Segunda a Sexta: 9h às 18h <br> Sábado: 9h às 14h</p>
                        </div>
                    </div>
                </div>
            </div>
            
    </section>

    <footer>
    </footer>
</body>
</html>
